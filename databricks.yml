bundle:
  name: arxivist_ai

variables:
  user_email:
    description: "User email for notifications and paths"
    default: ${workspace.current_user.userName}

workspace:
  host: https://adb-7405605185991044.4.azuredatabricks.net

targets:
  dev:
    mode: development
    workspace:
      root_path: ~/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    medallion_pipeline:
      name: "[${bundle.target}] ArxiVist AI - Medallion Pipeline"
      
      job_clusters:
        - job_cluster_key: main_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4ds_v5"
            autoscale:
              min_workers: 1
              max_workers: 2
            autotermination_minutes: 30
      
      tasks:
        - task_key: bronze_ingestion
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: ./Bronze_layer/bronze_ingestion.ipynb
            source: WORKSPACE
        
        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: ./Silver_layer/silver_transformation.ipynb
            source: WORKSPACE
        
        - task_key: gold_chunks
          depends_on:
            - task_key: silver_transformation
          job_cluster_key: main_cluster
          notebook_task:
            notebook_path: ./Gold_layer/chunks_table.ipynb
            source: WORKSPACE
    
      
      email_notifications:
        on_failure:
          - ${var.user_email}
      
      max_concurrent_runs: 1
